server:
  port: 8083

spring:
  application:
    name: comprovante-consulta
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

# ------------------------------------------------------------------------------
# TODO (Aula 3) — cache por perfil:
#   plano-a-docker: spring.data.redis.host/port (Redis do Docker)
#   plano-b-jvm:    Caffeine (CacheManager em memória) — nada externo
#   plano-c:        ConcurrentHashMap como cache local (demo conceitual)
# Retentativas: 3 antes de 404 (configurável).
# ------------------------------------------------------------------------------

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Aula 3 — fonte de dados da consulta (o gravador) para o fallback de cache
gravador:
  base-url: http://localhost:8082
